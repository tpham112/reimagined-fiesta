site_name: A&R Procedure Manual
site_description: Santa Ana College Admissions & Records Procedure Manual
site_author: Santa Ana College A&R
docs_dir: docs
repo_url: https://github.com/YOUR-ORG/ar-manual
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
  font:
    text: DM Sans
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
    - content.action.edit

extra_css:
  - stylesheets/extra.css

plugins: 
  - search:
      lang: en
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - General Information:
    - Overview: general/index.md
    - Colleague Pages Reference: general/colleague-pages.md
